version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17

  pre_build:
    commands:
      - echo "Cleaning project..."
      - mvn clean

  build:
    commands:
      - echo "Building Spring Boot application..."
      - mvn package -DskipTests

  post_build:
    commands:
      - echo "Build completed"

artifacts:
  files:
    - target/*.jar
  discard-paths: yes